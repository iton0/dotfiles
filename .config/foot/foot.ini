[main]
font=JetBrainsMono Nerd Font Mono:size=11

# Uses CPU cores for rendering glyphs
workers=4

# High-DPI support
dpi-aware=yes

[scrollback]
lines=5000

[mouse]
hide-when-typing=yes

[tweak]
# High-speed throughput tweaks
# 1. Force 8-bit color depth (faster than 10/16-bit buffers)
surface-bit-depth=8-bit

# 3. Disable complex grapheme shaping (much faster rendering)
grapheme-shaping=no

# 4. Use a larger shared memory pool for images/Sixel
max-shm-pool-size-mb=512

# 5. Disable font-related warnings that can slow down startup
font-monospace-warn=no

[colors]
