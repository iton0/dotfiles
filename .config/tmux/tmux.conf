unbind C-b
set-option -g prefix C-Space
bind C-Space send-prefix

set -g base-index 1
set -g renumber-windows on
set -g allow-passthrough on
set -g focus-events on
set -g visual-bell off
set -g detach-on-destroy off
set -g mouse on
set -sg escape-time 0

unbind v
unbind l
unbind L
unbind ,
unbind f
unbind j 
unbind r 
unbind h
unbind k

set-window-option -g mode-keys vi
unbind -T copy-mode-vi MouseDragEnd1Pane
bind v copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

bind , command-prompt -I "#{window_name}" "rename-window '%%'"
bind f run-shell "~/.local/scripts/tmux-sessionizer"
bind k kill-session
bind h new-session -A -s HOME -c "$HOME"
bind l new-session -A -s devlog -c "~/Code/personal/dev-log" "make; $SHELL"
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloading..."
bind j switch-client -l

set -g status-position top
set -g status-left-length 100
set -g status-left "#S"
set -g status-right ' '
set -g status-justify absolute-centre
set -g message-style 'fg=color15,bg=color3,bold'
set -g status-style 'fg=color7'
set -g status-left-style 'fg=color8'
set -g status-right-style 'fg=color8'
setw -g window-status-current-format ' #I:#W '
setw -g mode-style 'fg=color0,bg=color11,bold'
setw -g window-status-current-style 'fg=color3,bold'
setw -g window-status-format ' #I:#W '
setw -g window-status-style 'fg=color8'

if-shell "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone --depth=1 https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

set -g @resurrect-strategy-nvim 'session'
set -g @continuum-save-interval '5'
set -g @continuum-restore 'on'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

run '~/.tmux/plugins/tpm/tpm'
