unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

set -g base-index 1
set-option -g renumber-windows on
set-option -g allow-passthrough on
set-option -g focus-events on
set-option -g visual-bell off
set-option -g detach-on-destroy off
set-option -g mouse on
set -sg escape-time 0

set-window-option -g mode-keys vi
unbind -T copy-mode-vi MouseDragEnd1Pane
bind-key v copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

bind-key , command-prompt -I "#{window_name}" "rename-window '%%'"
bind-key f run-shell "~/.local/scripts/tmux-sessionizer"
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloading..."

set-option -g status-position top
set-option -g status-left-length 100
set-option -g status-right-length 0
set -g status-left "#S"
set -g status-right ''
set -g status-justify absolute-centre
set -g status-style 'fg=color7'
set -g status-left-style 'fg=color7'
set -g status-right-style 'fg=color15'
setw -g window-status-current-format ' #I:#W '
setw -g window-status-current-style 'fg=color3,bold'
setw -g window-status-format ' #I:#W '
setw -g window-status-style 'fg=color7'
